<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 画像プロンプトジェネレーター – プレビュー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; font-size: 16px; line-height: 1.5; background: #f8fafc; color: #1e293b; }

  /* Header */
  header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 24px 32px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p  { font-size: 13px; color: #64748b; margin-top: 6px; }

  /* Layout */
  .body { max-width: 1100px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
  @media (max-width: 860px) { .body { grid-template-columns: 1fr; padding: 20px 16px; } .right-col { order: -1; } }

  .left-col, .right-col { display: flex; flex-direction: column; gap: 16px; }

  /* Card */
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }

  /* Category title */
  .cat-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 8px; }

  .tag-wrap { position: relative; display: inline-block; }

  .tag {
    padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid #e2e8f0; background: #fff; color: #1e293b; cursor: pointer;
    transition: all .15s ease; appearance: none; font-family: inherit;
  }
  .tag:hover { border-color: #6366f1; color: #6366f1; background: #e0e7ff; }
  .tag.selected { background: #6366f1; border-color: #6366f1; color: #fff; }
  .tag.selected:hover { background: #4f46e5; border-color: #4f46e5; }

  /* Tooltip */
  .tooltip {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; border-radius: 8px; padding: 10px 12px; width: 220px;
    z-index: 100; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.2); font-size: 12px;
  }
  .tooltip::after {
    content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #1e293b;
  }
  .tag-wrap:hover .tooltip { display: block; }
  .tooltip-value { font-size: 11px; color: rgba(255,255,255,.7); font-family: monospace; margin-bottom: 4px; word-break: break-word; }
  .tooltip-desc  { line-height: 1.5; }

  /* Subject textarea */
  .subject-label { display: block; font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  textarea {
    width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px;
    font-size: 13px; font-family: inherit; line-height: 1.6; color: #1e293b; resize: vertical; outline: none;
    transition: border-color .15s ease;
  }
  textarea:focus { border-color: #6366f1; }
  textarea::placeholder { color: rgba(100,116,139,.6); }

  /* Output card */
  .output-card { position: sticky; top: 24px; }
  .output-label { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .selected-count { font-size: 12px; font-weight: 400; }
  .output-text {
    min-height: 120px; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 12px;
    font-size: 13px; line-height: 1.7; font-family: monospace; background: #f8fafc;
    word-break: break-word; white-space: pre-wrap; margin-bottom: 12px;
  }
  .output-empty { color: rgba(100,116,139,.5); font-family: sans-serif; font-style: italic; font-size: 13px; }

  .copy-btn {
    display: block; width: 100%; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
    text-align: center; border: none; cursor: pointer; font-family: inherit; transition: all .15s ease;
    background: #6366f1; color: #fff;
  }
  .copy-btn:hover { background: #4f46e5; }
  .copy-btn:active { background: #4338ca; }
  .copy-btn.copied { background: #10b981; cursor: default; }
  .copy-btn:disabled { opacity: .4; cursor: default; }

  .clear-btn {
    display: block; width: 100%; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500;
    text-align: center; border: 1.5px solid #e2e8f0; background: transparent; cursor: pointer;
    font-family: inherit; color: #64748b; margin-top: 8px; transition: all .15s ease;
  }
  .clear-btn:hover { border-color: #ef4444; color: #ef4444; }

  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }
  .badge { display: flex; align-items: center; gap: 4px; padding: 3px 8px; background: #e0e7ff; border-radius: 12px; font-size: 11px; color: #6366f1; font-weight: 500; }
  .badge-remove { width: 14px; height: 14px; border-radius: 50%; background: #6366f1; color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .badge-remove:hover { background: #4f46e5; }
</style>
</head>
<body>

<header>
  <h1>AI 画像プロンプトジェネレーター</h1>
  <p>各カテゴリからオプションを選んでプロンプトを組み立てましょう。タグにカーソルを合わせると説明が表示されます。</p>
</header>

<div class="body">
  <div class="left-col" id="left-col">
    <div class="card">
      <label class="subject-label" for="subject">主題・被写体</label>
      <textarea id="subject" rows="3" placeholder="例: a young woman standing in a field of flowers, holding a lantern"></textarea>
    </div>
    <!-- categories injected by JS -->
  </div>
  <div class="right-col">
    <div class="card output-card">
      <div class="output-label">
        生成プロンプト
        <span class="selected-count" id="count">未選択</span>
      </div>
      <div class="output-text" id="output"><span class="output-empty">左のカテゴリからオプションを選ぶと、ここにプロンプトが表示されます。</span></div>
      <button class="copy-btn" id="copy-btn" disabled>クリップボードにコピー</button>
      <button class="clear-btn" id="clear-btn">すべてクリア</button>
      <div class="badges" id="badges"></div>
    </div>
  </div>

    { id: "nostalgic",   label: "懐かしい",             value: "nostalgic, vintage feel, retro atmosphere",  desc: "過去を思い起こさせる懐かしく温かみのある雰囲気" },
    { id: "tense",       label: "緊張・スリリング",     value: "tense, dramatic, suspenseful",               desc: "ハラハラするような緊張感と興奮を持つ雰囲気" },
    { id: "peaceful",    label: "平和・穏やか",         value: "peaceful, serene, calm, tranquil",           desc: "穏やかで心が落ち着く静かな雰囲気" },
    { id: "surreal",     label: "幻想的・シュール",     value: "surreal, dreamlike, fantastical",            desc: "現実離れした非現実的で夢のような雰囲気" },
    { id: "epic",        label: "壮大・力強い",         value: "epic, powerful, grand, majestic",            desc: "スケールの大きな迫力と力強さを持つ雰囲気" },
    { id: "melancholic", label: "切ない・憂鬱",         value: "melancholic, bittersweet, wistful",          desc: "悲しくも美しい切なさや憂いを帯びた雰囲気" },
  ]},
  { id: "background", label: "背景・舞台", items: [
    { id: "simple",      label: "シンプル背景",     value: "simple background, plain background",            desc: "被写体を引き立てるシンプルな単色背景" },
    { id: "outdoor",     label: "アウトドア・自然", value: "outdoor, nature background, scenic",             desc: "自然の中での開放的な屋外シーン" },
    { id: "city",        label: "都市・街",         value: "cityscape, urban background, city streets",      desc: "ビルや街並みが広がる都市的な背景" },
    { id: "interior",    label: "室内",             value: "interior, indoor setting, cozy room",            desc: "部屋や建物の内部を舞台にした室内シーン" },
    { id: "space",       label: "宇宙",             value: "outer space, cosmic background, galaxy",         desc: "星々や銀河が広がるスケールの大きな宇宙背景" },
    { id: "forest",      label: "森・林",           value: "forest, woodland, lush vegetation",              desc: "木々が生い茂る緑豊かな森の背景" },
    { id: "ocean",       label: "海・水辺",         value: "ocean, seascape, coastal, waterside",            desc: "海や水辺の開放的で清涼感のある背景" },
    { id: "sky",         label: "空・雲",           value: "dramatic sky, cloudy sky, blue sky",             desc: "雲や色彩豊かな空を背景にした構図" },
    { id: "bokeh",       label: "ぼかし背景",       value: "blurred background, bokeh, depth of field",      desc: "背景をぼかして被写体を際立たせる表現" },
    { id: "ruins",       label: "廃墟・遺跡",       value: "ruins, ancient ruins, post-apocalyptic",         desc: "崩れた建物や古代遺跡の退廃的な背景" },

    { id: "telephoto",   label: "望遠レンズ",       value: "telephoto lens, 200mm lens",                     desc: "遠くのものを大きく捉える圧縮効果のある望遠表現" },
    { id: "fisheye",     label: "魚眼レンズ",       value: "fisheye lens, ultra wide angle, distorted",      desc: "180度以上の超広角で周囲がゆがんで見える特殊レンズ" },

// ---- state ----
const selected = new Set();
let subject = "";

// ---- render categories ----
const leftCol = document.getElementById("left-col");
CATEGORIES.forEach(cat => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="cat-title">${cat.label}</div><div class="tags" id="tags-${cat.id}"></div>`;
  leftCol.appendChild(card);
  const tagsEl = card.querySelector(`#tags-${cat.id}`);
  cat.items.forEach(item => {
    const wrap = document.createElement("div");
    wrap.className = "tag-wrap";
    wrap.innerHTML = `
      <div class="tooltip">
        <div class="tooltip-value">${item.value}</div>
        <div class="tooltip-desc">${item.desc}</div>
      </div>
      <button class="tag" data-id="${item.id}" type="button">${item.label}</button>
    `;
    wrap.querySelector("button").addEventListener("click", () => toggleItem(item.id));
    tagsEl.appendChild(wrap);
  });
});

// ---- event handlers ----
document.getElementById("subject").addEventListener("input", e => {
  subject = e.target.value;
  update();
});

document.getElementById("copy-btn").addEventListener("click", () => {
  const prompt = buildPrompt();
  if (!prompt) return;
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "コピーしました ✓";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "クリップボードにコピー";
      btn.classList.remove("copied");
    }, 2000);
  });
});

document.getElementById("clear-btn").addEventListener("click", () => {
  selected.clear();
  subject = "";
  document.getElementById("subject").value = "";
  document.querySelectorAll(".tag.selected").forEach(t => t.classList.remove("selected"));
  update();
});

// ---- helpers ----
function toggleItem(id) {
  if (selected.has(id)) {
    selected.delete(id);
  } else {
    selected.add(id);
  }
  const btn = document.querySelector(`.tag[data-id="${id}"]`);
  if (btn) btn.classList.toggle("selected", selected.has(id));
  update();
}

function findItem(id) {
  for (const cat of CATEGORIES) {
    const it = cat.items.find(i => i.id === id);
    if (it) return it;
  }
}

function buildPrompt() {
  const parts = [];
  if (subject.trim()) parts.push(subject.trim());
  for (const cat of CATEGORIES) {
    for (const item of cat.items) {
      if (selected.has(item.id)) parts.push(item.value);
    }
  }
  return parts.join(", ");
}

function update() {
  const prompt = buildPrompt();
  const outputEl = document.getElementById("output");
  const copyBtn  = document.getElementById("copy-btn");
  const countEl  = document.getElementById("count");
  const badgesEl = document.getElementById("badges");

  const n = selected.size + (subject.trim() ? 1 : 0);
  countEl.textContent = n > 0 ? `${n} 件選択中` : "未選択";

  if (prompt) {
    outputEl.textContent = prompt;
    copyBtn.disabled = false;
  } else {
    outputEl.innerHTML = '<span class="output-empty">左のカテゴリからオプションを選ぶと、ここにプロンプトが表示されます。</span>';
    copyBtn.disabled = true;
  }

  badgesEl.innerHTML = "";
  selected.forEach(id => {
    const item = findItem(id);
    if (!item) return;
    const badge = document.createElement("div");
    badge.className = "badge";
    badge.innerHTML = `${item.label}<button class="badge-remove" type="button" aria-label="${item.label}を削除">×</button>`;
    badge.querySelector("button").addEventListener("click", () => toggleItem(id));
    badgesEl.appendChild(badge);
  });
}
</script>
</body>
</html>
