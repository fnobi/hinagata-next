name: prod-build

on:
  push:
    branches:
      - main

env:
  ACTIONS_INSTALL_COMMAND: pnpm install
  ACTIONS_BUILD_COMMAND: npm run build
  ACTIONS_BUILD_DIST: dist
  ACTIONS_LOCK_FILE: pnpm-lock.json
  NEXT_PUBLIC_SITE_ORIGIN: https://prompt-holder-d7fd7.web.app
  NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyDT4w3saZtuiT7KOHm-P2znGrK_7awHF5s"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "prompt-holder-d7fd7.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "prompt-holder-d7fd7"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "prompt-holder-d7fd7.firebasestorage.app"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "302882251787"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:302882251787:web:6c8f8d7f73f8ee42f5130e"

  GOOGLE_APPLICATION_CREDENTIALS: /home/runner/credentials.json
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles(format('**/{0}',env.ACTIONS_LOCK_FILE)) }}
          restore-keys: ${{ runner.os }}-node-

      - name: install dependencies
        run: ${{ env.ACTIONS_INSTALL_COMMAND }}

      - name: install functions dependencies
        run: pnpm install --prefix functions

      - name: build
        run: ${{ env.ACTIONS_BUILD_COMMAND }}

      - name: setup gcp credentials
        run: echo ${{ secrets.GCP_CREDENTIALS_PROD }} | base64 --decode > ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: deploy firebase
        run: npx firebase deploy --project ${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
